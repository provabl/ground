# ground configuration example
# Copy to ground.yaml and fill in your values.
# ground.yaml is in .gitignore — never commit real AWS account IDs.

org:
  name: "My Research University"
  region: us-east-1
  management_account_id: "123456789012"
  audit_email: audit@example.edu
  logging_email: logging@example.edu
  workload_ous:
    - research
    - sandbox

network:
  transit_gateway: true
  cidr_block: "10.0.0.0/8"
  vpc_endpoints:
    - s3
    - ec2
    - sts
    - ssm
    - secretsmanager
    - kms
    - logs

  # External research-data endpoints reachable in-place (compute-to-data: the SRE
  # gets network access to the dataset at its source; data never moves into the
  # SRE). Declaring an endpoint lets ground render the egress-gating SCP
  # (data_endpoint_access_scp — denies these actions unless the account carries an
  # attest:data-classes posture tag) and export the endpoint in ground-meta for
  # attest, whose dataset-scoped Cedar policy makes the fine per-DUA/per-dataset
  # decision (provabl ADR 0002, ground#10). The VPC-routing half (the network
  # stack) is a follow-up — this is the policy/metadata surface.
  data_endpoints:
    - name: ncbi-dbgap
      vendor: NCBI dbGaP
      url: s3.amazonaws.com
      data_class: GENOMIC
      sre_types: [nih-genomics]
      authorized_ous: [SensitiveResearch/NIHGenomic]
      notes: "Controlled-access genomic data. Per-DUA access enforced by attest's Cedar policy."

identity:
  identity_center: true

logging:
  retention_days: 365

# Security detection services (GuardDuty, Security Hub, Macie) are NOT configured
# here — that is attest's responsibility after 'attest compile' selects the correct
# standards for your active compliance frameworks.
#
# Declare any non-AWS services deployed in your SRE so attest can assess which
# compliance controls they satisfy (e.g., CrowdStrike satisfies endpoint protection
# controls, Globus with BAA satisfies HIPAA data-transfer controls).
security:
  external_services:
    # CrowdStrike Falcon — endpoint detection and response (FedRAMP High authorized)
    - name: crowdstrike-falcon
      vendor: CrowdStrike
      category: edr
      features: [fedramp-high, soc2-type2]
      scope: []  # empty = org-wide

    # Globus — research data transfer platform
    # High Assurance mode required for dbGaP, HIPAA, and CUI datasets.
    # Globus has a BAA for HIPAA-covered data flows.
    - name: globus
      vendor: Globus / University of Chicago
      category: data-transfer
      features: [baa, high-assurance, fedramp-moderate]
      scope: [SensitiveResearch, NIHGenomic, HIPAAResearch]
      notes: "High Assurance enabled; BAA signed 2025-01. Required for dbGaP transfers."

    # Splunk — SIEM (comment out if using a different SIEM or native CloudWatch)
    # - name: splunk-cloud
    #   vendor: Splunk
    #   category: siem
    #   features: [fedramp-moderate]
    #   scope: []

    # Palo Alto Prisma Cloud — CSPM/CWPP
    # - name: prisma-cloud
    #   vendor: Palo Alto Networks
    #   category: cspm
    #   features: [soc2-type2]
    #   scope: []

    # Tenable.io — vulnerability scanning
    # - name: tenable-io
    #   vendor: Tenable
    #   category: vuln-scanning
    #   features: [fedramp-moderate]
    #   scope: []

tagging:
  required_tags:
    - project
    - environment
    - owner
    - data-classification
